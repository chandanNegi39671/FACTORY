version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./defects.db
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A backend.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./defects.db
    depends_on:
      - redis
      - backend

  celery_beat:
    build: .
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./defects.db
    depends_on:
      - redis
      - backend
